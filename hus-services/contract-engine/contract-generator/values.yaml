nodeSelector:
  role: hus

# Enable ingress so the JWKS endpoint is reachable by other nodes' Validators.
# TEMP: flip to false once ds-gateway fronts the service.
ingress:
  enabled: true
  className: ""
  annotations: {}
  hosts:
    - host: ds-contract-generator.hus.nextgen.hiro-develop.nl
      paths:
        - path: /.well-known/jwks.json
          pathType: Exact
  tls: []

contractGenerator:
  # MUST match the node's external identity — used as iss, aud, and JWKS host.
  nodeId: "hus.nextgen.hiro-develop.nl"
  # The kid published in the JWT header and JWKS. Bump suffix when keys rotate.
  signingKeyId: "hus.nextgen.hiro-develop.nl#key-1"
  # In-cluster URL of the stub Clearing House (same namespace).
  clearingHouseUrl: "http://ds-clearing-house-stub:8084"
  signingKeyPath: "/keys/ed25519.pem"
  defaultTtlSeconds: 3600
  maxItemsPerContract: 50
  environment: "production"
  logLevel: INFO

# Ed25519 signing key mounted from a Kubernetes Secret.
# Secret must be created beforehand via deploy/scripts/generate-signing-key.sh
signingKeySecret:
  enabled: true
  name: "ds-contract-generator-signing-key"
  mountPath: "/keys"

serviceMonitor:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi